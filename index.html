<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>???</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Baloo+2:wght@600;700;800&family=Quicksand:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        min-height: 100vh;
        background: #0b0c14;
        overflow-x: hidden;
        font-family: "Quicksand", sans-serif;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        padding: 24px 16px;
      }

      /* ── STARFIELD ── */
      .stars {
        position: fixed;
        inset: 0;
        z-index: 0;
        background: radial-gradient(
          ellipse at 50% 20%,
          #161a2c 0%,
          #0b0c14 65%
        );
      }

      .star {
        position: absolute;
        background: #fff;
        border-radius: 50%;
        animation: twinkleStar ease-in-out infinite;
      }

      @keyframes twinkleStar {
        0%,
        100% {
          opacity: 0.15;
          transform: scale(1);
        }
        50% {
          opacity: 1;
          transform: scale(1.3);
        }
      }

      .fog {
        position: fixed;
        inset: -20%;
        z-index: 0;
        background:
          radial-gradient(
            circle at 20% 80%,
            rgba(120, 80, 160, 0.1),
            transparent 40%
          ),
          radial-gradient(
            circle at 80% 30%,
            rgba(80, 100, 180, 0.1),
            transparent 40%
          );
        animation: fogDrift 18s ease-in-out infinite alternate;
        pointer-events: none;
      }

      @keyframes fogDrift {
        from {
          transform: translate(0, 0) scale(1);
        }
        to {
          transform: translate(3%, -2%) scale(1.05);
        }
      }

      /* ── SCENE ── */
      .scene {
        position: relative;
        z-index: 1;
        text-align: center;
        max-width: 500px;
        width: 100%;
      }

      .eyebrow {
        font-family: "Quicksand", sans-serif;
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #6a6f95;
        opacity: 0;
        animation: revealUp 1s ease 0.2s forwards;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .eyebrow::before,
      .eyebrow::after {
        content: "✦";
        color: #4d5380;
        margin: 0 8px;
        font-size: 9px;
      }

      .title {
        font-family: "Cormorant Garamond", serif;
        font-style: italic;
        font-weight: 600;
        font-size: clamp(26px, 8vw, 38px);
        color: #f1ecff;
        margin: 14px 0 8px;
        letter-spacing: 0.5px;
        opacity: 0;
        animation: revealUp 1s ease 0.45s forwards;
        text-shadow: 0 0 24px rgba(170, 150, 255, 0.35);
        line-height: 1.25;
      }

      .subtitle {
        font-size: 13px;
        color: #8a8fb5;
        margin-bottom: 28px;
        font-style: italic;
        opacity: 0;
        animation: revealUp 1s ease 0.65s forwards;
        line-height: 1.6;
      }

      /* ── SEAL ── */
      .seal-wrap {
        position: relative;
        width: 120px;
        height: 120px;
        margin: 0 auto 30px;
        opacity: 0;
        animation: revealUp 1s ease 0.85s forwards;
      }

      .seal-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 1px solid rgba(170, 150, 255, 0.25);
        animation: rotateSlow 30s linear infinite;
      }

      .seal-ring::before,
      .seal-ring::after {
        content: "✦";
        position: absolute;
        color: rgba(200, 180, 255, 0.5);
        font-size: 10px;
      }

      .seal-ring::before {
        top: -5px;
        left: 50%;
        transform: translateX(-50%);
      }
      .seal-ring::after {
        bottom: -5px;
        left: 50%;
        transform: translateX(-50%);
      }

      @keyframes rotateSlow {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      .seal-core {
        position: absolute;
        inset: 18px;
        border-radius: 50%;
        background: radial-gradient(circle at 35% 30%, #2b2f52, #15172b 70%);
        box-shadow:
          0 0 30px rgba(140, 120, 230, 0.35),
          inset 0 0 20px rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 34px;
        animation: pulseGlow 3s ease-in-out infinite;
      }

      @keyframes pulseGlow {
        0%,
        100% {
          box-shadow:
            0 0 30px rgba(140, 120, 230, 0.35),
            inset 0 0 20px rgba(0, 0, 0, 0.5);
        }
        50% {
          box-shadow:
            0 0 46px rgba(140, 120, 230, 0.55),
            inset 0 0 20px rgba(0, 0, 0, 0.5);
        }
      }

      /* ── COUNTDOWN ── */
      .countdown {
        display: flex;
        justify-content: center;
        align-items: flex-start;
        gap: 6px;
        opacity: 0;
        animation: revealUp 1s ease 1.05s forwards;
        flex-wrap: nowrap;
        width: 100%;
      }

      .unit {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 0;
        flex: 1;
        max-width: 80px;
      }

      .unit .num {
        font-family: "Cormorant Garamond", serif;
        font-weight: 600;
        font-size: clamp(32px, 9vw, 48px);
        color: #f1ecff;
        text-shadow: 0 0 18px rgba(170, 150, 255, 0.4);
        line-height: 1;
        width: 100%;
        text-align: center;
      }

      .unit .label {
        margin-top: 8px;
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #6a6f95;
        white-space: nowrap;
      }

      .sep {
        font-family: "Cormorant Garamond", serif;
        font-size: clamp(24px, 6vw, 36px);
        color: #4d5380;
        padding-top: 2px;
        flex-shrink: 0;
        line-height: 1;
      }

      .num.flicker {
        animation: flickerNum 0.25s ease;
      }

      @keyframes flickerNum {
        0% {
          opacity: 0.2;
        }
        100% {
          opacity: 1;
        }
      }

      .footer-note {
        margin-top: 28px;
        font-size: 12px;
        color: #565b80;
        opacity: 0;
        animation: revealUp 1s ease 1.25s forwards;
        letter-spacing: 0.5px;
        font-style: italic;
      }

      /* ════════════════════════════
           UNLOCK / LEVEL UP REVEAL
        ════════════════════════════ */
      .unlock-overlay {
        position: fixed;
        inset: 0;
        z-index: 100;
        background: #0b0c14;
        display: none;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        text-align: center;
        padding: 30px;
        overflow: hidden;
      }

      .unlock-overlay.active {
        display: flex;
        animation: fadeIn 0.6s ease;
      }

      /* starfield reuse di dalam overlay */
      .unlock-stars {
        position: absolute;
        inset: 0;
        z-index: 0;
      }

      .unlock-content {
        position: relative;
        z-index: 1;
        max-width: 600px;
      }

      .unlock-burst {
        font-size: 56px;
        opacity: 0;
        animation: burstReveal 0.8s ease forwards;
      }

      @keyframes burstReveal {
        0% {
          opacity: 0;
          transform: scale(0.5);
        }
        60% {
          opacity: 1;
          transform: scale(1.15);
        }
        100% {
          opacity: 1;
          transform: scale(1);
        }
      }

      .unlock-burst.pulse {
        animation:
          burstReveal 0.8s ease forwards,
          burstPulse 1.6s ease-in-out 0.8s infinite;
      }

      @keyframes burstPulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
      }

      .unlock-text-wrap {
        margin-top: 28px;
        min-height: 120px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .unlock-text {
        font-family: "Baloo 2", cursive;
        font-weight: 700;
        font-size: clamp(22px, 6.5vw, 38px);
        color: #f1ecff;
        text-shadow: 0 0 26px rgba(170, 150, 255, 0.5);
        line-height: 1.4;
      }

      .unlock-cursor {
        display: inline-block;
        width: 3px;
        background: #cdb8ff;
        margin-left: 2px;
        height: 0.9em;
        vertical-align: text-bottom;
        animation: blinkCursor 0.8s steps(1) infinite;
      }

      @keyframes blinkCursor {
        50% {
          opacity: 0;
        }
      }

      .unlock-sub {
        margin-top: 18px;
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: #6a6f95;
        opacity: 0;
        animation: fadeIn 0.8s ease forwards;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @keyframes revealUp {
        from {
          opacity: 0;
          transform: translateY(16px);
          filter: blur(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
          filter: blur(0);
        }
      }
    </style>
  </head>
  <body>
    <div class="stars" id="stars"></div>
    <div class="fog"></div>

    <div class="scene">
      <div class="eyebrow">sesuatu sedang menunggu</div>
      <div class="title">jangan dibuka dulu, sayang...</div>
      <div class="subtitle">ada kejutan kecil yang masih terkunci waktu</div>

      <div class="seal-wrap">
        <div class="seal-ring"></div>
        <div class="seal-core">🔒</div>
      </div>

      <div class="countdown" id="countdown">
        <div class="unit">
          <div class="num" id="days">--</div>
          <div class="label">Hari</div>
        </div>
        <div class="sep">:</div>
        <div class="unit">
          <div class="num" id="hours">--</div>
          <div class="label">Jam</div>
        </div>
        <div class="sep">:</div>
        <div class="unit">
          <div class="num" id="minutes">--</div>
          <div class="label">Menit</div>
        </div>
        <div class="sep">:</div>
        <div class="unit">
          <div class="num" id="seconds">--</div>
          <div class="label">Detik</div>
        </div>
      </div>

      <div class="footer-note">
        sabar ya, semuanya akan terbuka pada waktunya 🤫
      </div>
    </div>

    <!-- ═══ UNLOCK / LEVEL UP REVEAL (tampil sekali) ═══ -->
    <div class="unlock-overlay" id="unlockOverlay">
      <div class="unlock-stars" id="unlockStars"></div>
      <div class="unlock-content">
        <div class="unlock-burst" id="unlockBurst">🔓</div>
        <div class="unlock-text-wrap">
          <div class="unlock-text" id="unlockText"></div>
        </div>
        <div class="unlock-sub" id="unlockSub">level up unlocked</div>
      </div>
    </div>

    <script>
      // ── GENERATE STARS (halaman utama) ──
      function generateStars(container, count) {
        for (let i = 0; i < count; i++) {
          const star = document.createElement("div");
          star.classList.add("star");
          const size = Math.random() * 2 + 1;
          star.style.width = size + "px";
          star.style.height = size + "px";
          star.style.left = Math.random() * 100 + "vw";
          star.style.top = Math.random() * 100 + "vh";
          star.style.animationDuration = 2 + Math.random() * 3 + "s";
          star.style.animationDelay = Math.random() * 4 + "s";
          container.appendChild(star);
        }
      }
      generateStars(document.getElementById("stars"), 90);
      generateStars(document.getElementById("unlockStars"), 60);

      // ── COUNTDOWN TARGET ──
      // 9 September 2026, 00:00 WIB (UTC+7)
      const target = new Date("2026-09-09T00:00:00+07:00").getTime();

      const elDays = document.getElementById("days");
      const elHours = document.getElementById("hours");
      const elMinutes = document.getElementById("minutes");
      const elSeconds = document.getElementById("seconds");
      const overlay = document.getElementById("unlockOverlay");

      let lastSeconds = -1;

      function pad(n) {
        return String(n).padStart(2, "0");
      }

      // ── CEK APAKAH REVEAL SUDAH PERNAH DITONTON ──
      const REVEAL_KEY = "levelUpRevealSeen";
      const alreadySeen = localStorage.getItem(REVEAL_KEY) === "true";

      function tick() {
        const now = Date.now();
        const diff = target - now;

        if (diff <= 0) {
          clearInterval(timer);
          elDays.textContent = "00";
          elHours.textContent = "00";
          elMinutes.textContent = "00";
          elSeconds.textContent = "00";

          if (alreadySeen) {
            // sudah pernah lihat reveal-nya, langsung ke main.html
            window.location.href = "main.html";
          } else {
            showUnlockReveal();
          }
          return;
        }

        const d = Math.floor(diff / (1000 * 60 * 60 * 24));
        const h = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const m = Math.floor((diff / (1000 * 60)) % 60);
        const s = Math.floor((diff / 1000) % 60);

        elDays.textContent = pad(d);
        elHours.textContent = pad(h);
        elMinutes.textContent = pad(m);
        elSeconds.textContent = pad(s);

        if (s !== lastSeconds) {
          elSeconds.classList.remove("flicker");
          void elSeconds.offsetWidth;
          elSeconds.classList.add("flicker");
          lastSeconds = s;
        }
      }

      // ── TAMPILKAN REVEAL (HANYA SEKALI) ──
      function showUnlockReveal() {
        overlay.classList.add("active");

        const burst = document.getElementById("unlockBurst");
        const unlockText = document.getElementById("unlockText");
        const unlockSub = document.getElementById("unlockSub");

        // ganti emoji jadi level-up vibe setelah burst pertama selesai
        setTimeout(() => {
          burst.textContent = "🎮✨";
          burst.classList.add("pulse");
        }, 800);

        // mulai typewriter setelah delay sedikit
        setTimeout(() => {
          typeUnlockText(
            "Happy Level Up Day 21st My Support System",
            unlockText,
            () => {
              unlockSub.style.animationDelay = "0.2s";
              // tandai sudah pernah ditonton & redirect setelah beberapa saat
              localStorage.setItem(REVEAL_KEY, "true");
              setTimeout(() => {
                window.location.href = "main.html";
              }, 2800);
            },
          );
        }, 1100);
      }

      function typeUnlockText(text, target, onDone) {
        let i = 0;
        const speed = 45;
        const cursor = document.createElement("span");
        cursor.classList.add("unlock-cursor");
        target.textContent = "";
        target.appendChild(cursor);

        function step() {
          if (i < text.length) {
            const charNode = document.createTextNode(text[i]);
            target.insertBefore(charNode, cursor);
            i++;
            setTimeout(step, speed);
          } else {
            cursor.remove();
            if (onDone) onDone();
          }
        }
        step();
      }

      // ── INISIALISASI ──
      if (target - Date.now() <= 0 && !alreadySeen) {
        // kalau halaman dibuka pas waktu sudah lewat & belum pernah lihat reveal
        elDays.textContent = "00";
        elHours.textContent = "00";
        elMinutes.textContent = "00";
        elSeconds.textContent = "00";
        showUnlockReveal();
      } else if (target - Date.now() <= 0 && alreadySeen) {
        window.location.href = "main.html";
      } else {
        tick();
        var timer = setInterval(tick, 1000);
      }
    </script>
  </body>
</html>
